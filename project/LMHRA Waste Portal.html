<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LMHRA Pharmaceutical Waste Disposal Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800&family=Spectral:wght@500;600;700&display=swap" rel="stylesheet" />
<style>
/* ============================================================
   LMHRA Pharmaceutical Waste Disposal Portal
   Design system — Clean institutional gov-tech
   ============================================================ */

:root {
  /* Theme: Petrol (default) — set on <body data-theme> */
  --c-primary: #0b4f6c;
  --c-primary-700: #093e56;
  --c-primary-300: #4d8aa3;
  --c-accent: #1b98a8;
  --c-accent-soft: #e3f1f3;
  --c-primary-soft: #e7eef2;

  /* Neutrals — cool-warm slate */
  --c-bg: #eef1f4;
  --c-bg-2: #f6f8fa;
  --c-surface: #ffffff;
  --c-ink: #16242c;
  --c-ink-2: #3c4c56;
  --c-ink-3: #6b7c87;
  --c-line: #dde4e9;
  --c-line-2: #e9eef2;

  /* Status */
  --c-ok: #1f7a52;
  --c-ok-soft: #e3f2ea;
  --c-warn: #9a6700;
  --c-warn-soft: #fbf1da;
  --c-danger: #b3261e;
  --c-danger-soft: #fbe6e4;
  --c-info: #1b6aa8;
  --c-info-soft: #e4eef7;

  /* Type */
  --font-display: "Spectral", Georgia, serif;
  --font-ui: "Public Sans", system-ui, -apple-system, sans-serif;

  /* Geometry */
  --r-sm: 6px;
  --r-md: 10px;
  --r-lg: 14px;
  --r-xl: 20px;
  --shadow-sm: 0 1px 2px rgba(16,36,44,.06), 0 1px 3px rgba(16,36,44,.05);
  --shadow-md: 0 2px 4px rgba(16,36,44,.06), 0 8px 24px rgba(16,36,44,.08);
  --shadow-lg: 0 12px 40px rgba(16,36,44,.16);

  --pad: 24px;
  --gap: 16px;
}

body[data-theme="forest"] {
  --c-primary: #1f5a3d;
  --c-primary-700: #16472f;
  --c-primary-300: #5c9277;
  --c-accent: #3a9d6b;
  --c-accent-soft: #e6f2ec;
  --c-primary-soft: #e7efe9;
}
body[data-theme="navy"] {
  --c-primary: #1a2b4a;
  --c-primary-700: #11203a;
  --c-primary-300: #5e6e8c;
  --c-accent: #c6452f;
  --c-accent-soft: #f7e7e3;
  --c-primary-soft: #e7eaf0;
}

body[data-density="compact"] {
  --pad: 16px;
  --gap: 12px;
}

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }
body {
  font-family: var(--font-ui);
  background: var(--c-bg);
  color: var(--c-ink);
  -webkit-font-smoothing: antialiased;
  text-rendering: optimizeLegibility;
}
#root { min-height: 100vh; }

h1, h2, h3, h4 { margin: 0; font-weight: 600; letter-spacing: -0.01em; }
p { margin: 0; }
button { font-family: inherit; cursor: pointer; }
a { color: inherit; text-decoration: none; }
::selection { background: var(--c-accent-soft); }

/* Scrollbar */
::-webkit-scrollbar { width: 10px; height: 10px; }
::-webkit-scrollbar-thumb { background: #c4cfd6; border-radius: 8px; border: 2px solid var(--c-bg-2); }
::-webkit-scrollbar-track { background: transparent; }

/* ---------- Layout shell ---------- */
.app { min-height: 100vh; display: flex; flex-direction: column; }

.persona-bar {
  height: 44px; flex: none;
  background: var(--c-ink);
  color: #cdd8df;
  display: flex; align-items: center; gap: 14px;
  padding: 0 16px; font-size: 12.5px;
  position: sticky; top: 0; z-index: 60;
}
.persona-bar .pb-brand { display: flex; align-items: center; gap: 9px; color: #fff; font-weight: 600; letter-spacing: .02em; }
.persona-bar .pb-mark { width: 22px; height: 22px; border-radius: 6px; background: var(--c-accent); display: grid; place-items: center; color: #fff; font-family: var(--font-display); font-size: 13px; font-weight: 700; }
.persona-bar .pb-sep { color: #4a5a64; }
.persona-bar .pb-roles { display: flex; gap: 4px; margin-left: auto; }
.pb-role {
  display: flex; align-items: center; gap: 7px;
  padding: 5px 11px; border-radius: 7px; border: 1px solid transparent;
  background: transparent; color: #aebcc4; font-size: 12px; font-weight: 500;
  transition: all .14s ease;
}
.pb-role:hover { background: #243239; color: #fff; }
.pb-role[data-active="true"] { background: var(--c-accent); color: #fff; }
.pb-role .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: .8; }

.body-row { flex: 1; display: flex; min-height: 0; }

/* ---------- Sidebar ---------- */
.sidebar {
  width: 248px; flex: none; background: var(--c-primary); color: #dce8ec;
  display: flex; flex-direction: column; padding: 18px 0;
}
.sidebar.collapsed { width: 76px; }
.sb-brand { display: flex; align-items: center; gap: 11px; padding: 4px 20px 18px; }
.sb-mark { width: 36px; height: 36px; border-radius: 9px; background: rgba(255,255,255,.12); display: grid; place-items: center; font-family: var(--font-display); font-weight: 700; font-size: 18px; color: #fff; flex: none; }
.sb-brand .t1 { font-weight: 700; font-size: 15px; color: #fff; letter-spacing: .01em; }
.sb-brand .t2 { font-size: 11px; color: rgba(255,255,255,.6); }
.sb-section { font-size: 10.5px; text-transform: uppercase; letter-spacing: .09em; color: rgba(255,255,255,.42); padding: 16px 20px 7px; font-weight: 600; }
.sb-nav { display: flex; flex-direction: column; gap: 2px; padding: 0 12px; }
.sb-item {
  display: flex; align-items: center; gap: 12px; padding: 9px 12px; border-radius: 8px;
  color: rgba(255,255,255,.78); font-size: 13.5px; font-weight: 500; border: none; background: none; text-align: left; width: 100%;
  transition: background .13s ease, color .13s ease;
}
.sb-item:hover { background: rgba(255,255,255,.08); color: #fff; }
.sb-item[data-active="true"] { background: rgba(255,255,255,.16); color: #fff; font-weight: 600; }
.sb-item .ico { width: 18px; height: 18px; flex: none; opacity: .9; }
.sb-item .badge-n { margin-left: auto; background: var(--c-accent); color: #fff; font-size: 10.5px; font-weight: 700; border-radius: 999px; padding: 1px 7px; }
.sb-spacer { flex: 1; }
.sb-user { display: flex; align-items: center; gap: 10px; padding: 12px 16px; margin: 8px 12px 0; border-top: 1px solid rgba(255,255,255,.12); }
.sb-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--c-accent); display: grid; place-items: center; color: #fff; font-size: 12.5px; font-weight: 700; flex: none; }
.sb-user .t1 { font-size: 12.5px; color: #fff; font-weight: 600; }
.sb-user .t2 { font-size: 11px; color: rgba(255,255,255,.55); }

/* ---------- Top-nav layout variant ---------- */
.topnav {
  height: 60px; flex: none; background: var(--c-primary); color: #fff;
  display: flex; align-items: center; gap: 8px; padding: 0 22px;
}
.topnav .tn-brand { display: flex; align-items: center; gap: 11px; margin-right: 18px; }
.topnav .sb-mark { width: 32px; height: 32px; font-size: 16px; }
.tn-nav { display: flex; gap: 2px; }
.tn-item { display: flex; align-items: center; gap: 8px; padding: 8px 13px; border-radius: 8px; color: rgba(255,255,255,.8); font-size: 13.5px; font-weight: 500; background: none; border: none; }
.tn-item:hover { background: rgba(255,255,255,.1); color: #fff; }
.tn-item[data-active="true"] { background: rgba(255,255,255,.18); color: #fff; font-weight: 600; }

/* ---------- Main column ---------- */
.main { flex: 1; min-width: 0; display: flex; flex-direction: column; background: var(--c-bg); }
.topbar {
  height: 64px; flex: none; background: var(--c-surface); border-bottom: 1px solid var(--c-line);
  display: flex; align-items: center; gap: 16px; padding: 0 var(--pad);
}
.topbar .crumb { font-size: 12.5px; color: var(--c-ink-3); }
.topbar .pg-title { font-size: 19px; font-weight: 600; font-family: var(--font-display); letter-spacing: -0.01em; }
.topbar .search { margin-left: auto; display: flex; align-items: center; gap: 9px; background: var(--c-bg-2); border: 1px solid var(--c-line); border-radius: 9px; padding: 8px 13px; width: 260px; color: var(--c-ink-3); font-size: 13px; }
.topbar .search input { border: none; background: none; outline: none; font-family: inherit; font-size: 13px; width: 100%; color: var(--c-ink); }
.icon-btn { width: 38px; height: 38px; border-radius: 9px; border: 1px solid var(--c-line); background: var(--c-surface); display: grid; place-items: center; color: var(--c-ink-2); position: relative; }
.icon-btn:hover { background: var(--c-bg-2); }
.icon-btn .ping { position: absolute; top: 7px; right: 8px; width: 8px; height: 8px; border-radius: 50%; background: var(--c-accent); border: 2px solid #fff; }

.content { flex: 1; overflow-y: auto; padding: var(--pad); }
.content-inner { max-width: 1180px; margin: 0 auto; }
.page-head { margin-bottom: 22px; }
.page-head .eyebrow { font-size: 11.5px; text-transform: uppercase; letter-spacing: .08em; color: var(--c-accent); font-weight: 700; margin-bottom: 6px; }
.page-head h1 { font-family: var(--font-display); font-size: 27px; font-weight: 600; }
.page-head p { color: var(--c-ink-3); font-size: 14px; margin-top: 6px; max-width: 640px; }

/* ---------- Cards & grid ---------- */
.grid { display: grid; gap: var(--gap); }
.card { background: var(--c-surface); border: 1px solid var(--c-line); border-radius: var(--r-lg); box-shadow: var(--shadow-sm); }
.card-pad { padding: var(--pad); }
.card-head { display: flex; align-items: center; gap: 12px; padding: 16px var(--pad); border-bottom: 1px solid var(--c-line-2); }
.card-head h3 { font-size: 15px; font-weight: 600; }
.card-head .sub { font-size: 12.5px; color: var(--c-ink-3); }
.card-head .right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

.stat { background: var(--c-surface); border: 1px solid var(--c-line); border-radius: var(--r-lg); padding: 18px 20px; box-shadow: var(--shadow-sm); position: relative; overflow: hidden; }
.stat .lab { font-size: 12.5px; color: var(--c-ink-3); font-weight: 500; display: flex; align-items: center; gap: 8px; }
.stat .num { font-size: 30px; font-weight: 700; font-family: var(--font-display); margin-top: 8px; letter-spacing: -0.02em; }
.stat .delta { font-size: 12px; margin-top: 7px; display: inline-flex; align-items: center; gap: 5px; font-weight: 600; }
.stat .delta.up { color: var(--c-ok); }
.stat .delta.down { color: var(--c-danger); }
.stat .delta.flat { color: var(--c-ink-3); }
.stat .stat-ico { position: absolute; top: 16px; right: 16px; width: 34px; height: 34px; border-radius: 9px; background: var(--c-primary-soft); color: var(--c-primary); display: grid; place-items: center; }

/* ---------- Buttons ---------- */
.btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; padding: 9px 16px; border-radius: 9px; font-size: 13.5px; font-weight: 600; border: 1px solid transparent; transition: all .13s ease; white-space: nowrap; }
.btn-primary { background: var(--c-primary); color: #fff; }
.btn-primary:hover { background: var(--c-primary-700); }
.btn-accent { background: var(--c-accent); color: #fff; }
.btn-accent:hover { filter: brightness(.94); }
.btn-ghost { background: var(--c-surface); color: var(--c-ink-2); border-color: var(--c-line); }
.btn-ghost:hover { background: var(--c-bg-2); }
.btn-soft { background: var(--c-primary-soft); color: var(--c-primary); }
.btn-soft:hover { filter: brightness(.97); }
.btn-sm { padding: 6px 11px; font-size: 12.5px; border-radius: 7px; }
.btn-lg { padding: 12px 22px; font-size: 14.5px; }
.btn:disabled { opacity: .5; pointer-events: none; }

/* ---------- Badges / pills ---------- */
.pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 999px; font-size: 11.5px; font-weight: 600; letter-spacing: .01em; line-height: 1.5; }
.pill .dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
.pill-ok { background: var(--c-ok-soft); color: var(--c-ok); }
.pill-warn { background: var(--c-warn-soft); color: var(--c-warn); }
.pill-danger { background: var(--c-danger-soft); color: var(--c-danger); }
.pill-info { background: var(--c-info-soft); color: var(--c-info); }
.pill-neutral { background: var(--c-line-2); color: var(--c-ink-2); }
.pill-accent { background: var(--c-accent-soft); color: var(--c-accent); }

.tag { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: var(--r-sm); font-size: 11.5px; font-weight: 600; background: var(--c-bg-2); border: 1px solid var(--c-line); color: var(--c-ink-2); }

/* ---------- Tables ---------- */
.tbl { width: 100%; border-collapse: collapse; font-size: 13px; }
.tbl th { text-align: left; font-size: 11px; text-transform: uppercase; letter-spacing: .06em; color: var(--c-ink-3); font-weight: 700; padding: 11px var(--pad); border-bottom: 1px solid var(--c-line); background: var(--c-bg-2); }
.tbl td { padding: 13px var(--pad); border-bottom: 1px solid var(--c-line-2); color: var(--c-ink-2); vertical-align: middle; }
.tbl tr:last-child td { border-bottom: none; }
.tbl tr.clickable { cursor: pointer; }
.tbl tr.clickable:hover td { background: var(--c-bg-2); }
.tbl .mono { font-variant-numeric: tabular-nums; font-weight: 600; color: var(--c-ink); }
.tbl .strong { font-weight: 600; color: var(--c-ink); }

/* ---------- Forms ---------- */
.field { display: flex; flex-direction: column; gap: 6px; }
.field label { font-size: 12.5px; font-weight: 600; color: var(--c-ink-2); }
.field .hint { font-size: 11.5px; color: var(--c-ink-3); }
.field .req { color: var(--c-danger); }
.input, .select, .textarea {
  font-family: inherit; font-size: 13.5px; color: var(--c-ink);
  background: var(--c-surface); border: 1px solid var(--c-line); border-radius: 9px;
  padding: 10px 12px; outline: none; width: 100%; transition: border .13s, box-shadow .13s;
}
.input:focus, .select:focus, .textarea:focus { border-color: var(--c-accent); box-shadow: 0 0 0 3px var(--c-accent-soft); }
.textarea { resize: vertical; min-height: 84px; }
.input.invalid, .select.invalid { border-color: var(--c-danger); }
.form-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px 20px; }
.form-grid .col-2 { grid-column: span 2; }
.checkrow { display: flex; align-items: center; gap: 10px; padding: 11px 14px; border: 1px solid var(--c-line); border-radius: 10px; background: var(--c-surface); font-size: 13.5px; transition: all .12s; }
.checkrow:hover { border-color: var(--c-primary-300); }
.checkrow[data-on="true"] { border-color: var(--c-accent); background: var(--c-accent-soft); }
.checkrow input { width: 16px; height: 16px; accent-color: var(--c-accent); }

/* ---------- Stepper ---------- */
.stepper { display: flex; align-items: center; gap: 0; margin-bottom: 26px; }
.step { display: flex; align-items: center; gap: 11px; flex: 1; }
.step .dot { width: 30px; height: 30px; border-radius: 50%; flex: none; display: grid; place-items: center; font-size: 13px; font-weight: 700; background: var(--c-surface); border: 2px solid var(--c-line); color: var(--c-ink-3); }
.step .lab { font-size: 12.5px; font-weight: 600; color: var(--c-ink-3); }
.step .line { flex: 1; height: 2px; background: var(--c-line); margin: 0 12px; }
.step[data-state="done"] .dot { background: var(--c-ok); border-color: var(--c-ok); color: #fff; }
.step[data-state="done"] .lab { color: var(--c-ink-2); }
.step[data-state="done"] .line { background: var(--c-ok); }
.step[data-state="active"] .dot { background: var(--c-primary); border-color: var(--c-primary); color: #fff; box-shadow: 0 0 0 4px var(--c-primary-soft); }
.step[data-state="active"] .lab { color: var(--c-ink); }

/* ---------- Workflow tracker (the 9-step pipeline) ---------- */
.tracker { display: flex; flex-direction: column; gap: 0; }
.trk { display: flex; gap: 14px; }
.trk .rail { display: flex; flex-direction: column; align-items: center; }
.trk .node { width: 26px; height: 26px; border-radius: 50%; flex: none; display: grid; place-items: center; background: var(--c-surface); border: 2px solid var(--c-line); color: var(--c-ink-3); font-size: 12px; }
.trk .bar { width: 2px; flex: 1; background: var(--c-line); min-height: 14px; }
.trk .body { padding-bottom: 18px; }
.trk .body .t { font-size: 13.5px; font-weight: 600; color: var(--c-ink); }
.trk .body .d { font-size: 12px; color: var(--c-ink-3); margin-top: 2px; }
.trk[data-state="done"] .node { background: var(--c-ok); border-color: var(--c-ok); color: #fff; }
.trk[data-state="done"] .bar { background: var(--c-ok); }
.trk[data-state="active"] .node { background: var(--c-primary); border-color: var(--c-primary); color: #fff; box-shadow: 0 0 0 4px var(--c-primary-soft); }
.trk[data-state="active"] .body .t { color: var(--c-primary); }

/* ---------- Misc ---------- */
.divider { height: 1px; background: var(--c-line-2); margin: 18px 0; }
.kv { display: flex; flex-direction: column; gap: 3px; }
.kv .k { font-size: 11.5px; color: var(--c-ink-3); font-weight: 600; text-transform: uppercase; letter-spacing: .04em; }
.kv .v { font-size: 14px; color: var(--c-ink); font-weight: 500; }
.muted { color: var(--c-ink-3); }
.row { display: flex; align-items: center; gap: 10px; }
.between { display: flex; align-items: center; justify-content: space-between; gap: 12px; }
.wrap { display: flex; flex-wrap: wrap; gap: 8px; }

/* progress mini bar */
.pbar { height: 7px; border-radius: 999px; background: var(--c-line-2); overflow: hidden; }
.pbar > i { display: block; height: 100%; background: var(--c-accent); border-radius: 999px; }

/* Empty / placeholder image */
.ph {
  background-color: var(--c-bg-2);
  background-image: repeating-linear-gradient(45deg, #e6ebef 0 10px, #f2f5f7 10px 20px);
  border: 1px dashed var(--c-line); border-radius: var(--r-md);
  display: grid; place-items: center; color: var(--c-ink-3);
  font-family: ui-monospace, monospace; font-size: 11.5px; letter-spacing: .02em;
}

/* Drawer / modal */
.scrim { position: fixed; inset: 0; background: rgba(16,36,44,.42); z-index: 80; display: flex; justify-content: flex-end; animation: fade .18s ease; }
.scrim.center { align-items: center; justify-content: center; }
@keyframes fade { from { opacity: 0; } }
.drawer { width: 540px; max-width: 94vw; background: var(--c-bg); height: 100%; overflow-y: auto; box-shadow: var(--shadow-lg); animation: slidein .22s cubic-bezier(.2,.8,.2,1); }
@keyframes slidein { from { transform: translateX(30px); opacity: .4; } }
.modal { width: 460px; max-width: 92vw; background: var(--c-surface); border-radius: var(--r-lg); box-shadow: var(--shadow-lg); animation: pop .18s ease; }
@keyframes pop { from { transform: scale(.96); opacity: .5; } }
.drawer-head { position: sticky; top: 0; background: var(--c-surface); border-bottom: 1px solid var(--c-line); padding: 18px var(--pad); display: flex; align-items: center; gap: 12px; z-index: 2; }

/* toast */
.toast-wrap { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 120; display: flex; flex-direction: column; gap: 8px; align-items: center; }
.toast { background: var(--c-ink); color: #fff; padding: 11px 18px; border-radius: 10px; font-size: 13px; font-weight: 500; box-shadow: var(--shadow-lg); display: flex; align-items: center; gap: 10px; animation: pop .2s ease; }
.toast .tk { width: 18px; height: 18px; border-radius: 50%; background: var(--c-ok); display: grid; place-items: center; }

/* fade-in util for view transitions */
.viewfade { animation: vf .26s ease; }
@keyframes vf { from { opacity: 0; transform: translateY(6px); } }

/* mobile device backdrop */
.mobile-stage { min-height: 100%; display: flex; gap: 36px; align-items: flex-start; justify-content: center; padding: 36px 20px; background:
  radial-gradient(1200px 500px at 50% -10%, var(--c-primary-soft), transparent 60%), var(--c-bg); }
.mobile-aside { width: 280px; padding-top: 28px; }
.mobile-aside h2 { font-family: var(--font-display); font-size: 21px; margin-bottom: 8px; }
.mobile-aside p { font-size: 13px; color: var(--c-ink-3); line-height: 1.55; }

</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<body>

/* tiny bar chart */
function BarChart({ data, valKey, labKey = "m", color = "var(--c-accent)", fmt = (v) => v, height = 150 }) {
  const max = Math.max(...data.map((d) => d[valKey]));
  return (
    <div style={{ display: "flex", alignItems: "flex-end", gap: 10, height, padding: "8px 4px 0" }}>
      {data.map((d, i) => (
        <div key={i} style={{ flex: 1, display: "flex", flexDirection: "column", alignItems: "center", gap: 7, height: "100%", justifyContent: "flex-end" }}>
          <div style={{ fontSize: 11, fontWeight: 700, color: "var(--c-ink-2)" }}>{fmt(d[valKey])}</div>
          <div style={{ width: "100%", maxWidth: 42, height: (d[valKey] / max) * (height - 50), background: color, borderRadius: "6px 6px 0 0", opacity: i === data.length - 1 ? .55 : 1, transition: "height .4s ease" }} />
          <div style={{ fontSize: 11.5, color: "var(--c-ink-3)", fontWeight: 600 }}>{d[labKey]}</div>
        </div>
      ))}
    </div>
  );
}

/* fee calculation for a request */
function computeFee(req) {
  const { FEES, facById, wasteByCode } = window.DB;
  const fac = facById[req.facilityId] || { km: 8 };
  const handling = req.lines.reduce((s, l) => s + l.declaredKg * (wasteByCode[l.code] ? wasteByCode[l.code].ratePerKg : 2), 0);
  const transport = +(fac.km * FEES.transportPerKm).toFixed(2);
  const total = +(FEES.baseHandling + transport + handling + FEES.certificate).toFixed(2);
  return { base: FEES.baseHandling, transport, handling: +handling.toFixed(2), cert: FEES.certificate, total };
}

/* ---------------- New Request form ---------------- */
function NewRequest({ ctx, onDone }) {
  const toast = useToast();
  const { WASTE, wasteByCode, fmtUSD, facById } = window.DB;
  const wizard = ctx.tw.formStyle === "wizard";
  const [step, setStep] = useStateC(0);
  const [sel, setSel] = useStateC({}); // code -> {kg, units, pkg}
  const [meta, setMeta] = useStateC({ priority: "Normal", window: "", contact: "James Doe", access: "", notes: "", consent: false });
  const steps = ["Waste declaration", "Collection details", "Review & fees"];

  function toggle(code) {
    setSel((s) => { const n = { ...s }; if (n[code]) delete n[code]; else n[code] = { kg: "", units: "", pkg: "Sealed drums" }; return n; });
  }
  const lines = Object.entries(sel).map(([code, v]) => ({ code, declaredKg: +v.kg || 0, units: +v.units || 0, packaging: v.pkg }));
  const fakeReq = { facilityId: "F-1067", lines: lines.length ? lines : [{ code: "EXP", declaredKg: 0 }] };
  const fee = computeFee(fakeReq);
  const totalKg = lines.reduce((s, l) => s + l.declaredKg, 0);
  const canStep0 = lines.length > 0 && lines.every((l) => l.declaredKg > 0);

  function submit() { toast("Request submitted — WDR-2406-0148 created"); onDone(); }

  const declaration = (
    <Card className="card-pad">
      <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>Select waste categories</div>
      <p className="muted" style={{ fontSize: 12.5, marginBottom: 14 }}>Declare each category you need disposed. This is verified at collection and again at the Koko Town site.</p>
      <div className="grid" style={{ gridTemplateColumns: "repeat(2,1fr)", gap: 10 }}>
        {WASTE.map((w) => {
          const on = !!sel[w.code];
          return (
            <div key={w.code} className="checkrow" data-on={on} onClick={() => toggle(w.code)} style={{ alignItems: "flex-start", cursor: "pointer" }}>
              <input type="checkbox" checked={on} readOnly style={{ marginTop: 2 }} />
              <div style={{ flex: 1 }}>
                <div className="row" style={{ justifyContent: "space-between" }}><span style={{ fontWeight: 600 }}>{w.name}</span><HazardTag code={w.code} /></div>
                <div className="muted" style={{ fontSize: 11.5, marginTop: 2 }}>{w.note} · {fmtUSD(w.ratePerKg)}/kg</div>
              </div>
            </div>
          );
        })}
      </div>
      {lines.length > 0 && (
        <div style={{ marginTop: 18 }}>
          <div style={{ fontWeight: 700, fontSize: 13, marginBottom: 10 }}>Quantities</div>
          <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>

              <div key={code} className="row" style={{ gap: 12, background: "var(--c-bg-2)", padding: 12, borderRadius: 10 }}>
                <div className="row" style={{ width: 200 }}><HazardTag code={code} /><span style={{ fontSize: 12.5, fontWeight: 600 }}>{wasteByCode[code].name}</span></div>
                <Input type="number" placeholder="kg" value={sel[code].kg} onChange={(e) => setSel((s) => ({ ...s, [code]: { ...s[code], kg: e.target.value } }))} style={{ width: 90 }} />
                <Input type="number" placeholder="units" value={sel[code].units} onChange={(e) => setSel((s) => ({ ...s, [code]: { ...s[code], units: e.target.value } }))} style={{ width: 90 }} />
                <Select value={sel[code].pkg} onChange={(e) => setSel((s) => ({ ...s, [code]: { ...s[code], pkg: e.target.value } }))} style={{ flex: 1 }}>
                  {["Sealed drums", "Quarantine bags", "Sharps boxes", "Yellow rigid bins", "Cold box", "Jerry cans"].map((p) => <option key={p}>{p}</option>)}
                </Select>
              </div>
            ))}
          </div>
        </div>
      )}
    </Card>
  );

  const details = (
    <Card className="card-pad">
      <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 14 }}>Collection details</div>
      <div className="form-grid">
        <Field label="Priority"><Select value={meta.priority} onChange={(e) => setMeta({ ...meta, priority: e.target.value })}><option>Normal</option><option>High</option><option>Urgent (hazardous)</option></Select></Field>
        <Field label="Preferred collection window"><Select value={meta.window} onChange={(e) => setMeta({ ...meta, window: e.target.value })}><option value="">Select…</option><option>09:00–11:00</option><option>11:00–13:00</option><option>13:00–15:00</option></Select></Field>
        <Field label="On-site contact" req><Input value={meta.contact} onChange={(e) => setMeta({ ...meta, contact: e.target.value })} /></Field>
        <Field label="Contact phone"><Input defaultValue="+231 88 220 5512" /></Field>
        <Field label="Access notes" span hint="Loading bay, opening hours, gate code, etc."><Textarea value={meta.access} onChange={(e) => setMeta({ ...meta, access: e.target.value })} placeholder="e.g. Rear loading bay, open 8am–4pm, ask for pharmacy store" /></Field>
        <Field label="Additional notes" span><Textarea value={meta.notes} onChange={(e) => setMeta({ ...meta, notes: e.target.value })} /></Field>
      </div>
    </Card>
  );

  const review = (
    <div className="grid" style={{ gridTemplateColumns: "1.4fr 1fr" }}>
      <Card>
        <CardHead title="Declaration summary" icon="clipboard" />
        <table className="tbl">
          <thead><tr><th>Category</th><th>Declared</th><th>Units</th></tr></thead>
          <tbody>
            {lines.map((l) => <tr key={l.code}><td><div className="row"><HazardTag code={l.code} />{wasteByCode[l.code].name}</div></td><td className="mono">{l.declaredKg} kg</td><td>{l.units}</td></tr>)}
            <tr><td className="strong">Total</td><td className="mono">{totalKg} kg</td><td></td></tr>
          </tbody>
        </table>
        <div className="card-pad">
          <label className="checkrow" data-on={meta.consent} style={{ cursor: "pointer" }}>
            <input type="checkbox" checked={meta.consent} onChange={(e) => setMeta({ ...meta, consent: e.target.checked })} />
            <span style={{ fontSize: 12.5 }}>I confirm this declaration is accurate and consent to <strong>cash payment on collection</strong>. I understand weights are verified at collection and at the Koko Town site.</span>
          </label>
        </div>
      </Card>
      <Card className="card-pad" style={{ alignSelf: "flex-start" }}>
        <div style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>Estimated fees</div>
        <div className="muted" style={{ fontSize: 12, marginBottom: 14 }}>Final amount confirmed at collection</div>
        {[["Base handling", fee.base], ["Transport (" + (facById.F1067 ? "" : "") + (window.DB.facById["F-1067"].km) + " km)", fee.transport], ["Category handling", fee.handling], ["Certificate", fee.cert]].map(([k, v]) => (
          <div key={k} className="between" style={{ fontSize: 13, padding: "7px 0", borderBottom: "1px solid var(--c-line-2)" }}><span className="muted">{k}</span><span className="mono">{fmtUSD(v)}</span></div>
        ))}
        <div className="between" style={{ marginTop: 12 }}><span style={{ fontWeight: 700 }}>Total (cash)</span><span style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 22, color: "var(--c-primary)" }}>{fmtUSD(fee.total)}</span></div>
        <Btn kind="primary" size="lg" icon="check" disabled={!meta.consent} style={{ width: "100%", marginTop: 16 }} onClick={submit}>Submit request</Btn>
      </Card>
    </div>
  );

  if (!wizard) {
    return (
      <>
        <PageHead eyebrow="New disposal request" title="Single-page request form" desc="All fields on one page. Switch to the wizard in Tweaks." />
        <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>{declaration}{details}{review}</div>
      </>
    );
  }
  return (
    <>
      <PageHead eyebrow="New disposal request" title="Submit waste for disposal" desc="Three steps — declaration, collection details, then review." />
      <Stepper steps={steps} current={step} />
      <div style={{ marginBottom: 18 }}>{step === 0 ? declaration : step === 1 ? details : review}</div>
      <div className="between">
        <Btn kind="ghost" icon="back" onClick={() => (step === 0 ? onDone() : setStep(step - 1))}>{step === 0 ? "Cancel" : "Back"}</Btn>
        {step < 2 && <Btn kind="primary" iconR="arrowR" disabled={step === 0 && !canStep0} onClick={() => setStep(step + 1)}>Continue</Btn>}
      </div>
    </>
  );
}

/* ---------------- Client app shell ---------------- */
function ClientApp({ ctx }) {
  const user = window.DB.USERS.client;
  const myReqs = useMemoC(() => window.DB.REQUESTS.filter((r) => r.facilityId === user.facilityId), []);
  const active = myReqs.filter((r) => r.stage !== "certified").length;
  const [page, setPage] = useStateC("dash");
  const [open, setOpen] = useStateC(null);

  const nav = [
    { section: "Workspace", items: [
      { key: "dash", label: "Dashboard", icon: "grid" },
      { key: "new", label: "New request", icon: "filePlus" },
    ]},
    { section: "Track", items: [
      { key: "requests", label: "My requests", icon: "file", badge: active },
      { key: "schedule", label: "Schedule", icon: "calendar" },
    ]},
    { section: "Finance & records", items: [
      { key: "billing", label: "Billing & invoices", icon: "invoice" },
      { key: "certs", label: "Certificates", icon: "cert" },
      { key: "profile", label: "Facility profile", icon: "building" },
    ]},
  ];
  const titles = { dash: "Dashboard", new: "New request", requests: "My requests", schedule: "Schedule", billing: "Billing & invoices", certs: "Certificates", profile: "Facility profile" };

  function openReq(r) { if (r === "__all") { setPage("requests"); return; } setOpen(r); }

  let view;
  if (page === "dash") view = <ClientDashboard reqs={myReqs} onOpen={openReq} onNew={() => setPage("new")} />;
  else if (page === "new") view = <NewRequest ctx={ctx} onDone={() => setPage("requests")} />;
  else if (page === "requests") view = <ClientRequests reqs={myReqs} onOpen={setOpen} />;
  else if (page === "schedule") view = <ClientSchedule reqs={myReqs} />;
  else if (page === "billing") view = <ClientBilling reqs={myReqs} onOpen={setOpen} />;
  else if (page === "certs") view = <ClientCerts reqs={myReqs} onOpen={setOpen} />;
  else if (page === "profile") view = <ClientProfile />;

  return (
    <>
      <DeskShell nav={nav} active={page} onNav={setPage} user={user} roleLabel="Facility User" layout={ctx.tw.layout} title={titles[page]} crumb={"Facility · " + user.org}>
        {view}
      </DeskShell>
      <RequestDrawer req={open} onClose={() => setOpen(null)} />
    </>
  );
}

function CollectDrawer({ job, onClose, onConfirm }) {
  const toast = useToast();
  const { facById, fmtUSD, wasteByCode } = window.DB;
  const fac = facById[job.facilityId];
  const [actual, setActual] = useStateT(Object.fromEntries(job.lines.map(l => [l.code, ""])));
  const [photos, setPhotos] = useStateT(0);
  const [seal, setSeal] = useStateT("");
  const [cash, setCash] = useStateT(job.invoice.total.toFixed(2));
  const [confirmMatch, setConfirmMatch] = useStateT(false);
  const totalActual = Object.values(actual).reduce((s, v) => s + (+v || 0), 0);
  const variance = +(totalActual - job.declaredKg).toFixed(1);
  const canDone = totalActual > 0 && seal && photos > 0 && confirmMatch;
  return (
    <Drawer open={!!job} onClose={onClose}>
      <div className="drawer-head">
        <button className="icon-btn" onClick={onClose}><Icon name="x" size={17} /></button>
        <div style={{ flex: 1 }}><div className="muted" style={{ fontSize: 12 }}>Form F4 · Collection & verification</div><div style={{ fontWeight: 700, fontSize: 16, fontFamily: "var(--font-display)" }}>{fac.name}</div></div>
        <span className="tag" style={{ color: "var(--c-accent)" }}>{job.id}</span>
      </div>
      <div style={{ padding: "20px var(--pad)", display: "flex", flexDirection: "column", gap: 16 }}>
        <Card>
          <CardHead title="Weigh & verify each category" sub="Actual field weight vs facility declaration" icon="scale" />
          <table className="tbl"><thead><tr><th>Category</th><th>Declared</th><th>Actual (kg)</th><th>Variance</th></tr></thead>
            <tbody>{job.lines.map(l => { const a = +actual[l.code] || 0; const dv = +(a - l.declaredKg).toFixed(1); const ok = Math.abs(dv) <= l.declaredKg * 0.05; return (
              <tr key={l.code}><td><div className="row"><HazardTag code={l.code} /><span style={{ fontSize: 12.5 }}>{wasteByCode[l.code].name}</span></div></td><td className="mono">{l.declaredKg} kg</td><td><Input type="number" placeholder="kg" value={actual[l.code]} onChange={e => setActual({ ...actual, [l.code]: e.target.value })} style={{ width: 110 }} /></td><td>{a > 0 ? <Pill kind={ok ? "ok" : "warn"} dot={false}>{dv > 0 ? "+" : ""}{dv} kg</Pill> : <span className="muted">—</span>}</td></tr>
            ); })}</tbody>
          </table>
          <div className="card-pad between"><div><div style={{ fontWeight: 700 }}>Actual total</div><div className="muted" style={{ fontSize: 11.5 }}>declared {job.declaredKg} kg</div></div><div style={{ textAlign: "right" }}><div style={{ fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 22, color: "var(--c-primary)" }}>{totalActual} kg</div>{totalActual > 0 && <span style={{ fontSize: 12, fontWeight: 700, color: Math.abs(variance) <= job.declaredKg * 0.05 ? "var(--c-ok)" : "var(--c-warn)" }}>{variance > 0 ? "+" : ""}{variance} kg variance</span>}</div></div>
        </Card>
        <Card className="card-pad">
          <div style={{ fontWeight: 700, fontSize: 13.5, marginBottom: 10 }}>Evidence & custody</div>
          <div className="row" style={{ gap: 10, marginBottom: 14, flexWrap: "wrap" }}>{[0, 1, 2].map(idx => (
            <button key={idx} onClick={() => setPhotos(Math.max(photos, idx + 1))} style={{ width: 92, height: 72, borderRadius: 10, border: "1px dashed var(--c-line)", background: idx < photos ? "var(--c-accent-soft)" : "var(--c-bg-2)", display: "grid", placeItems: "center", color: idx < photos ? "var(--c-accent)" : "var(--c-ink-3)" }}><Icon name={idx < photos ? "check" : "camera"} size={20} /></button>
          ))}<span className="muted" style={{ fontSize: 12 }}>Attach photo evidence</span></div>
          <Field label="Container seal number(s)"><Input placeholder="e.g. SL-77410" value={seal} onChange={e => setSeal(e.target.value)} /></Field>

          <div className="between"><div style={{ fontWeight: 700, fontSize: 13.5 }}>Cash payment (Form F3)</div><span className="muted" style={{ fontSize: 12 }}>Invoiced {fmtUSD(job.invoice.total)}</span></div>
          <div className="row" style={{ gap: 8, marginTop: 10 }}><span style={{ fontWeight: 700, fontSize: 18, color: "var(--c-warn)" }}>$</span><Input type="number" value={cash} onChange={e => setCash(e.target.value)} style={{ maxWidth: 200 }} /><span className="muted" style={{ fontSize: 12 }}>receipt auto-generated on confirm</span></div>
        </Card>
        <label className="checkrow" data-on={confirmMatch} style={{ cursor: "pointer" }}><input type="checkbox" checked={confirmMatch} onChange={e => setConfirmMatch(e.target.checked)} /><span style={{ fontSize: 12.5 }}>I confirm the waste collected matches the declaration, has been sealed, and cash payment received.</span></label>
        <Btn kind="primary" size="lg" icon="check" disabled={!canDone} style={{ width: "100%" }} onClick={() => { toast("Collected · receipt RCT-" + job.id.slice(-4) + " issued"); onConfirm(job); }}>Confirm collection & seal</Btn>
      </div>
    </Drawer>
  );

const { useState: useStateK } = React;

/* ---- Receipt & reconciliation form (Form F6) ---- */
function ReceiptForm({ job, onClose, onConfirm }) {
  const toast = useToast();
  const { facById, fmtKg, fmtUSD, wasteByCode } = window.DB;
  const fac = facById[job.facilityId];
  const [wb, setWb] = useStateK("");
  const [sealOk, setSealOk] = useStateK(false);
  const [bay, setBay] = useStateK("Bay 1");
  const [decision, setDecision] = useStateK("accept");
  const wbn = +wb || 0;
  const vDeclared = +(wbn - job.declaredKg).toFixed(1);
  const vCollected = +(wbn - job.collection.collectedKg).toFixed(1);
  const within = job.collection.collectedKg ? Math.abs(vCollected) <= job.collection.collectedKg * 0.03 : false;
  const canDone = wbn > 0 && sealOk;

  return (
    <Drawer open={!!job} onClose={onClose}>
      <div className="drawer-head">
        <button className="icon-btn" onClick={onClose}><Icon name="x" size={17} /></button>
        <div style={{ flex: 1 }}><div className="muted" style={{ fontSize: 12 }}>Form F6 · Waste receipt &amp; reconciliation</div><div style={{ fontWeight: 700, fontSize: 16, fontFamily: "var(--font-display)" }}>{job.id}</div></div>
        <span className="tag" style={{ color: "var(--c-accent)" }}>Seal {job.collection.sealNo}</span>
      </div>
      <div style={{ padding: "20px var(--pad)", display: "flex", flexDirection: "column", gap: 16 }}>
        <Card className="card-pad">
          <div className="row" style={{ justifyContent: "space-between" }}><div><div style={{ fontWeight: 700 }}>{fac.name}</div><div className="muted" style={{ fontSize: 12 }}>Arrived {job.collection.time} · {job.collection.verifiedBy}</div></div><Icon name="truck" size={20} style={{ color: "var(--c-accent)" }} /></div>
        </Card>

        <Card className="card-pad">
          <div style={{ fontWeight: 700, fontSize: 13.5, marginBottom: 4 }}>Weighbridge reading</div>
          <div className="muted" style={{ fontSize: 12, marginBottom: 12 }}>Enter the gross verified weight at the Koko Town weighbridge.</div>
          <div className="row" style={{ gap: 10 }}>
            <Input type="number" placeholder="kg" value={wb} onChange={(e) => setWb(e.target.value)} style={{ flex: 1, fontSize: 18, fontWeight: 700 }} />
            <Select value={bay} onChange={(e) => setBay(e.target.value)} style={{ width: 120 }}><option>Bay 1</option><option>Bay 2</option><option>Bay 3</option></Select>
          </div>
        </Card>

        <Card>
          <CardHead title="Three-way reconciliation" sub="Declared → Collected → Received" icon="scale" />
          <table className="tbl">
            <thead><tr><th>Stage</th><th>Weight</th><th>Δ vs received</th></tr></thead>
            <tbody>
              <tr><td>Declared by facility</td><td className="mono">{fmtKg(job.declaredKg)}</td><td>{wbn ? (vDeclared > 0 ? "+" : "") + vDeclared + " kg" : "—"}</td></tr>
              <tr><td>Collected (field)</td><td className="mono">{fmtKg(job.collection.collectedKg)}</td><td>{wbn ? (vCollected > 0 ? "+" : "") + vCollected + " kg" : "—"}</td></tr>
              <tr><td className="strong">Received (weighbridge)</td><td className="mono">{wbn ? fmtKg(wbn) : "—"}</td><td>{wbn ? <Pill kind={within ? "ok" : "warn"} dot={false}>{within ? "Within tolerance" : "Review variance"}</Pill> : "—"}</td></tr>
            </tbody>
          </table>
        </Card>

        <Card className="card-pad">
          <div style={{ fontWeight: 700, fontSize: 13.5, marginBottom: 10 }}>Category confirmation</div>
          <div className="wrap">{job.lines.map((l) => <span key={l.code} className="checkrow" data-on={true} style={{ flex: "none" }}><Icon name="check" size={14} style={{ color: "var(--c-accent)" }} /><HazardTag code={l.code} />{wasteByCode[l.code].name}</span>)}</div>
          <label className="checkrow" data-on={sealOk} style={{ cursor: "pointer", marginTop: 12 }}><input type="checkbox" checked={sealOk} onChange={(e) => setSealOk(e.target.checked)} />Seal {job.collection.sealNo} verified intact on arrival</label>
        </Card>

        <Card className="card-pad">
          <div style={{ fontWeight: 700, fontSize: 13.5, marginBottom: 10 }}>Decision</div>
          <div className="row" style={{ gap: 8 }}>
            {[["accept", "Accept", "ok"], ["hold", "Hold for review", "warn"], ["reject", "Reject", "danger"]].map(([k, l, c]) => (
              <button key={k} className={"btn btn-sm " + (decision === k ? "btn-soft" : "btn-ghost")} style={decision === k ? { background: "var(--c-" + c + "-soft)", color: "var(--c-" + c + ")" } : {}} onClick={() => setDecision(k)}>{l}</button>
            ))}
          </div>
        </Card>

        <Btn kind="primary" size="lg" icon="check" disabled={!canDone} style={{ width: "100%" }} onClick={() => { toast("Receipt reconciled — RCV-" + job.id.slice(-4)); onConfirm(job); }}>Confirm receipt &amp; reconcile</Btn>
      </div>
    </Drawer>
  );
}

/* ---- Koko app ---- */
function KokoApp({ ctx }) {
  const user = window.DB.USERS.koko;
  const incomingCount = window.DB.REQUESTS.filter((r) => r.stage === "transit").length;
  const [page, setPage] = useStateK("dash");
  const [receive, setReceive] = useStateK(null);
  const [dispose, setDispose] = useStateK(null);
  const [issue, setIssue] = useStateK(null);
  const [open, setOpen] = useStateK(null);

  const nav = [
    { section: "Site", items: [
      { key: "dash", label: "Operations", icon: "grid" },
      { key: "incoming", label: "Incoming & receipt", icon: "truck", badge: incomingCount },
    ]},
    { section: "Process", items: [
      { key: "disposal", label: "Disposal log", icon: "flask" },
      { key: "certs", label: "Certificates", icon: "cert" },
    ]},
  ];
  const titles = { dash: "Site operations", incoming: "Incoming & receipt", disposal: "Disposal log", certs: "Certificates" };

  let view;
  if (page === "dash") view = <KokoDashboard onGo={setPage} />;
  else if (page === "incoming") view = <KokoIncoming onReceive={setReceive} onOpen={setOpen} />;
  else if (page === "disposal") view = <KokoDisposal onDispose={setDispose} />;
  else if (page === "certs") view = <KokoCerts onIssue={setIssue} onOpen={setOpen} />;

  return (
    <>
      <DeskShell nav={nav} active={page} onNav={setPage} user={user} roleLabel="Site Officer" layout={ctx.tw.layout} title={titles[page]} crumb="Koko Town Waste Management Site">
        {view}
      </DeskShell>
      {receive && <ReceiptForm job={receive} onClose={() => setReceive(null)} onConfirm={() => setReceive(null)} />}
      {dispose && <DisposalForm job={dispose} onClose={() => setDispose(null)} onConfirm={() => setDispose(null)} />}

      <RequestDrawer req={open} onClose={() => setOpen(null)} />
    </>
  );
}

// ── useTweaks ───────────────────────────────────────────────────────────────
// Single source of truth for tweak values. setTweak persists via the host
// (__edit_mode_set_keys → host rewrites the EDITMODE block on disk).
function useTweaks(defaults) {
  const [values, setValues] = React.useState(defaults);
  // Accepts either setTweak('key', value) or setTweak({ key: value, ... }) so a
  // useState-style call doesn't write a "[object Object]" key into the persisted
  // JSON block.
  const setTweak = React.useCallback((keyOrEdits, val) => {
    const edits = typeof keyOrEdits === 'object' && keyOrEdits !== null
      ? keyOrEdits : { [keyOrEdits]: val };
    setValues((prev) => ({ ...prev, ...edits }));
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits }, '*');
    // Same-window signal so in-page listeners (deck-stage rail thumbnails)
    // can react — the parent message only reaches the host, not peers.
    window.dispatchEvent(new CustomEvent('tweakchange', { detail: edits }));
  }, []);
  return [values, setTweak];
}

// ── TweaksPanel ─────────────────────────────────────────────────────────────
// Floating shell. Registers the protocol listener BEFORE announcing
// availability — if the announce ran first, the host's activate could land
// before our handler exists and the toolbar toggle would silently no-op.
// The close button posts __edit_mode_dismissed so the host's toolbar toggle
// flips off in lockstep; the host echoes __deactivate_edit_mode back which
// is what actually hides the panel.
function TweaksPanel({ title = 'Tweaks', children }) {
  const [open, setOpen] = React.useState(false);
  const dragRef = React.useRef(null);
  const offsetRef = React.useRef({ x: 16, y: 16 });
  const PAD = 16;

  const clampToViewport = React.useCallback(() => {
    const panel = dragRef.current;
    if (!panel) return;
    const w = panel.offsetWidth, h = panel.offsetHeight;
    const maxRight = Math.max(PAD, window.innerWidth - w - PAD);
    const maxBottom = Math.max(PAD, window.innerHeight - h - PAD);
    offsetRef.current = {
      x: Math.min(maxRight, Math.max(PAD, offsetRef.current.x)),
      y: Math.min(maxBottom, Math.max(PAD, offsetRef.current.y)),
    };
    panel.style.right = offsetRef.current.x + 'px';
    panel.style.bottom = offsetRef.current.y + 'px';
  }, []);

  React.useEffect(() => {
    if (!open) return;
    clampToViewport();
    if (typeof ResizeObserver === 'undefined') {
      window.addEventListener('resize', clampToViewport);
      return () => window.removeEventListener('resize', clampToViewport);
    }
    const ro = new ResizeObserver(clampToViewport);
    ro.observe(document.documentElement);
    return () => ro.disconnect();
  }, [open, clampToViewport]);

  React.useEffect(() => {
    const onMsg = (e) => {
      const t = e?.data?.type;
      if (t === '__activate_edit_mode') setOpen(true);
      else if (t === '__deactivate_edit_mode') setOpen(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const dismiss = () => {
    setOpen(false);
    window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*');
  };

  const onDragStart = (e) => {
    const panel = dragRef.current;
    if (!panel) return;
    const r = panel.getBoundingClientRect();
    const sx = e.clientX, sy = e.clientY;
    const startRight = window.innerWidth - r.right;
    const startBottom = window.innerHeight - r.bottom;
    const move = (ev) => {
      offsetRef.current = {
        x: startRight - (ev.clientX - sx),
        y: startBottom - (ev.clientY - sy),
      };
      clampToViewport();
    };
    const up = () => {
      window.removeEventListener('mousemove', move);
      window.removeEventListener('mouseup', up);
    };
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', up);
  };

  if (!open) return null;
  return (
    <>
      <style>{__TWEAKS_STYLE}</style>
      <div ref={dragRef} className="twk-panel" data-omelette-chrome=""
           style={{ right: offsetRef.current.x, bottom: offsetRef.current.y }}>
        <div className="twk-hd" onMouseDown={onDragStart}>
          <b>{title}</b>
          <button className="twk-x" aria-label="Close tweaks"
                  onMouseDown={(e) => e.stopPropagation()}
                  onClick={dismiss}>✕</button>
        </div>
        <div className="twk-body">
          {children}
        </div>
      </div>
    </>
  );
}

function TweakSection({ label, children }) {
  return (
    <>
      <div className="twk-sect">{label}</div>
      {children}
    </>
  );
}

function TweakRow({ label, value, children, inline = false }) {
  return (
    <div className={inline ? 'twk-row twk-row-h' : 'twk-row'}>
      <div className="twk-lbl">
        <span>{label}</span>
        {value != null && <span className="twk-val">{value}</span>}
      </div>
      {children}
    </div>
  );
}

// ── Controls ────────────────────────────────────────────────────────────────

function TweakSlider({ label, value, min = 0, max = 100, step = 1, unit = '', onChange }) {
  return (
    <TweakRow label={label} value={`${value}${unit}`}>
      <input type="range" className="twk-slider" min={min} max={max} step={step}
             value={value} onChange={(e) => onChange(Number(e.target.value))} />
    </TweakRow>
  );
}

function TweakToggle({ label, value, onChange }) {
  return (
    <div className="twk-row twk-row-h">
      <div className="twk-lbl"><span>{label}</span></div>
      <button type="button" className="twk-toggle" data-on={value ? '1' : '0'}
              role="switch" aria-checked={!!value}
              onClick={() => onChange(!value)}><i /></button>
    </div>
  );
}

function TweakRadio({ label, value, options, onChange }) {
  const trackRef = React.useRef(null);
  const [dragging, setDragging] = React.useState(false);
  // The active value is read by pointer-move handlers attached for the lifetime
  // of a drag — ref it so a stale closure doesn't fire onChange for every move.
  const valueRef = React.useRef(value);
  valueRef.current = value;

  // Segments wrap mid-word once per-segment width runs out. The track is
  // ~248px (280 panel − 28 body pad − 4 seg pad), each button loses 12px
  // to its own padding, and 11.5px system-ui averages ~6.3px/char — so 2
  // options fit ~16 chars each, 3 fit ~10. Past that (or >3 options), fall
  // back to a dropdown rather than wrap.
  const labelLen = (o) => String(typeof o === 'object' ? o.label : o).length;
  const maxLen = options.reduce((m, o) => Math.max(m, labelLen(o)), 0);
  const fitsAsSegments = maxLen <= ({ 2: 16, 3: 10 }[options.length] ?? 0);
  if (!fitsAsSegments) {
    // <select> emits strings — map back to the original option value so the
    // fallback stays type-preserving (numbers, booleans) like the segment path.
    const resolve = (s) => {
      const m = options.find((o) => String(typeof o === 'object' ? o.value : o) === s);
      return m === undefined ? s : typeof m === 'object' ? m.value : m;
    };
    return <TweakSelect label={label} value={value} options={options}
                        onChange={(s) => onChange(resolve(s))} />;
  }
  const opts = options.map((o) => (typeof o === 'object' ? o : { value: o, label: o }));
  const idx = Math.max(0, opts.findIndex((o) => o.value === value));
  const n = opts.length;

  const segAt = (clientX) => {
    const r = trackRef.current.getBoundingClientRect();
    const inner = r.width - 4;
    const i = Math.floor(((clientX - r.left - 2) / inner) * n);
    return opts[Math.max(0, Math.min(n - 1, i))].value;
  };

  const onPointerDown = (e) => {
    setDragging(true);
    const v0 = segAt(e.clientX);
    if (v0 !== valueRef.current) onChange(v0);
    const move = (ev) => {
      if (!trackRef.current) return;
      const v = segAt(ev.clientX);
      if (v !== valueRef.current) onChange(v);
    };
    const up = () => {
      setDragging(false);
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };

  return (
    <TweakRow label={label}>
      <div ref={trackRef} role="radiogroup" onPointerDown={onPointerDown}
           className={dragging ? 'twk-seg dragging' : 'twk-seg'}>
        <div className="twk-seg-thumb"
             style={{ left: `calc(2px + ${idx} * (100% - 4px) / ${n})`,
                      width: `calc((100% - 4px) / ${n})` }} />
        {opts.map((o) => (
          <button key={o.value} type="button" role="radio" aria-checked={o.value === value}>
            {o.label}
          </button>
        ))}
      </div>
    </TweakRow>
  );
}

function TweakSelect({ label, value, options, onChange }) {
  return (
    <TweakRow label={label}>
      <select className="twk-field" value={value} onChange={(e) => onChange(e.target.value)}>
        {options.map((o) => {
          const v = typeof o === 'object' ? o.value : o;
          const l = typeof o === 'object' ? o.label : o;
          return <option key={v} value={v}>{l}</option>;
        })}
      </select>
    </TweakRow>
  );
}

function TweakText({ label, value, placeholder, onChange }) {
  return (
    <TweakRow label={label}>
      <input className="twk-field" type="text" value={value} placeholder={placeholder}
             onChange={(e) => onChange(e.target.value)} />
    </TweakRow>
  );
}

function TweakNumber({ label, value, min, max, step = 1, unit = '', onChange }) {
  const clamp = (n) => {
    if (min != null && n < min) return min;
    if (max != null && n > max) return max;
    return n;
  };
  const startRef = React.useRef({ x: 0, val: 0 });
  const onScrubStart = (e) => {
    e.preventDefault();
    startRef.current = { x: e.clientX, val: value };
    const decimals = (String(step).split('.')[1] || '').length;
    const move = (ev) => {
      const dx = ev.clientX - startRef.current.x;
      const raw = startRef.current.val + dx * step;
      const snapped = Math.round(raw / step) * step;
      onChange(clamp(Number(snapped.toFixed(decimals))));
    };
    const up = () => {
      window.removeEventListener('pointermove', move);
      window.removeEventListener('pointerup', up);
    };
    window.addEventListener('pointermove', move);
    window.addEventListener('pointerup', up);
  };
  return (
    <div className="twk-num">
      <span className="twk-num-lbl" onPointerDown={onScrubStart}>{label}</span>
      <input type="number" value={value} min={min} max={max} step={step}
             onChange={(e) => onChange(clamp(Number(e.target.value)))} />
      {unit && <span className="twk-num-unit">{unit}</span>}
    </div>
  );
}

// Relative-luminance contrast pick — checkmarks drawn over a swatch need to
// read on both #111 and #fafafa without per-option configuration. Hex input
// only (#rgb / #rrggbb); named or rgb()/hsl() colors fall through to "light".
function __twkIsLight(hex) {
  const h = String(hex).replace('#', '');
  const x = h.length === 3 ? h.replace(/./g, (c) => c + c) : h.padEnd(6, '0');
  const n = parseInt(x.slice(0, 6), 16);
  if (Number.isNaN(n)) return true;
  const r = (n >> 16) & 255, g = (n >> 8) & 255, b = n & 255;
  return r * 299 + g * 587 + b * 114 > 148000;
}

const __TwkCheck = ({ light }) => (
  <svg viewBox="0 0 14 14" aria-hidden="true">
    <path d="M3 7.2 5.8 10 11 4.2" fill="none" strokeWidth="2.2"
          strokeLinecap="round" strokeLinejoin="round"
          stroke={light ? 'rgba(0,0,0,.78)' : '#fff'} />
  </svg>
);

// TweakColor — curated color/palette picker. Each option is either a single
// hex string or an array of 1-5 hex strings; the card adapts — a lone color
// renders solid, a palette renders colors[0] as the hero (left ~2/3) with the
// rest stacked in a sharp column on the right. onChange emits the
// option in the shape it was passed (string stays string, array stays array).
// Without options it falls back to the native color input for back-compat.
function TweakColor({ label, value, options, onChange }) {
  if (!options || !options.length) {
    return (
      <div className="twk-row twk-row-h">
        <div className="twk-lbl"><span>{label}</span></div>
        <input type="color" className="twk-swatch" value={value}
               onChange={(e) => onChange(e.target.value)} />
      </div>
    );
  }
  // Native <input type=color> emits lowercase hex per the HTML spec, so
  // compare case-insensitively. String() guards JSON.stringify(undefined),
  // which returns the primitive undefined (no .toLowerCase).
  const key = (o) => String(JSON.stringify(o)).toLowerCase();
  const cur = key(value);
  return (
    <TweakRow label={label}>
      <div className="twk-chips" role="radiogroup">
        {options.map((o, i) => {
          const colors = Array.isArray(o) ? o : [o];
          const [hero, ...rest] = colors;
          const sup = rest.slice(0, 4);
          const on = key(o) === cur;
          return (
            <button key={i} type="button" className="twk-chip" role="radio"
                    aria-checked={on} data-on={on ? '1' : '0'}
                    aria-label={colors.join(', ')} title={colors.join(' · ')}
                    style={{ background: hero }}
                    onClick={() => onChange(o)}>
              {sup.length > 0 && (
                <span>
                  {sup.map((c, j) => <i key={j} style={{ background: c }} />)}
                </span>
              )}
              {on && <__TwkCheck light={__twkIsLight(hero)} />}
            </button>
          );
        })}
      </div>
    </TweakRow>
  );
}

function TweakButton({ label, onClick, secondary = false }) {
  return (
    <button type="button" className={secondary ? 'twk-btn secondary' : 'twk-btn'}
            onClick={onClick}>{label}</button>
  );
}

Object.assign(window, {
  useTweaks, TweaksPanel, TweakSection, TweakRow,
  TweakSlider, TweakToggle, TweakRadio, TweakSelect,
  TweakText, TweakNumber, TweakColor, TweakButton,
});

/* ============================================================
   LMHRA Waste Portal — app shell, role switching, routing

const PERSONAS = [
  { role: "overview", label: "Overview", color: "#9bb3c0" },
  { role: "client", label: "Facility", color: "var(--c-info)" },
  { role: "transport", label: "Transport", color: "var(--c-accent)" },
  { role: "koko", label: "Koko Site", color: "var(--c-primary)" },
  { role: "admin", label: "Admin", color: "#9b6bc0" },
];

function PersonaBar({ role, setRole }) {
  return (
    <div className="persona-bar">
      <div className="pb-brand"><span style={{ background: "#fff", borderRadius: 6, padding: "3px 7px", display: "inline-flex", alignItems: "center" }}><img src={window.LOGO_SRC} alt="LMHRA" style={{ height: 18, display: "block" }} /></span></div>
      <span className="pb-sep">|</span>
      <span style={{ color: "#8a99a2" }}>Pharmaceutical Waste Disposal Portal</span>
      <span style={{ marginLeft: 14, fontSize: 11, color: "#6a7a83", display: "flex", alignItems: "center", gap: 6 }}>
        <Icon name="eye" size={13} /> Viewing as
      </span>
      <div className="pb-roles">
        {PERSONAS.map((p) => (
          <button key={p.role} className="pb-role" data-active={role === p.role} onClick={() => setRole(p.role)}>
            <span className="dot" style={{ background: p.color }} /> {p.label}
          </button>
        ))}
      </div>
    </div>
  );
}

/* Desktop shell wrapper used by client / koko / admin */
function DeskShell({ nav, active, onNav, user, roleLabel, title, crumb, layout, children }) {
  return (
    <div className="body-row">
      {layout === "topnav"
        ? null
        : <Sidebar nav={nav} active={active} onNav={onNav} user={user} roleLabel={roleLabel} />}
      <div className="main">
        {layout === "topnav" && <TopNav nav={nav} active={active} onNav={onNav} roleLabel={roleLabel} />}
        <TopBar title={title} crumb={crumb} user={user} />
        <div className="content"><div className="content-inner viewfade" key={active}>{children}</div></div>
      </div>
    </div>
  );
}

function ComingSoon({ label }) {
  return (
    <div className="content"><div className="content-inner">
      <Card className="card-pad" style={{ textAlign: "center", padding: 60 }}>
        <div style={{ fontSize: 16, fontWeight: 600 }}>{label}</div>
        <p className="muted" style={{ marginTop: 8 }}>This module is being assembled.</p>
      </Card>
    </div></div>
  );
}

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "theme": "petrol",
  "layout": "sidebar",
  "formStyle": "wizard",
  "density": "comfortable"
}/*EDITMODE-END*/;

function App() {
  const [role, setRole] = useState("overview");
  const [tw, setTweak] = useTweaks(TWEAK_DEFAULTS);

  // apply tweaks to body
  useEffect(() => {
    document.body.dataset.theme = tw.theme === "petrol" ? "" : tw.theme;
    document.body.dataset.density = tw.density;
  }, [tw.theme, tw.density]);

  const ctx = { tw };
  let body;
  if (role === "overview") body = <OverviewScreen onEnterRole={setRole} />;
  else if (role === "client") body = window.ClientApp ? <window.ClientApp ctx={ctx} /> : <ComingSoon label="Facility workspace" />;
  else if (role === "transport") body = window.TransportApp ? <window.TransportApp ctx={ctx} /> : <ComingSoon label="Transport workspace" />;
  else if (role === "koko") body = window.KokoApp ? <window.KokoApp ctx={ctx} /> : <ComingSoon label="Koko Town workspace" />;
  else if (role === "admin") body = window.AdminApp ? <window.AdminApp ctx={ctx} /> : <ComingSoon label="Admin workspace" />;

  return (
    <ToastHost>
      <div className="app">
        <PersonaBar role={role} setRole={setRole} />
        {body}
      </div>
      <TweaksPanel title="Tweaks">
        <TweakSection label="Appearance" />
        <TweakSelect label="Color theme" value={tw.theme} options={["petrol", "forest", "navy"]} onChange={(v) => setTweak("theme", v)} />
        <TweakRadio label="Density" value={tw.density} options={["comfortable", "compact"]} onChange={(v) => setTweak("density", v)} />
        <TweakSection label="Layout & flow" />
        <TweakRadio label="Desktop nav" value={tw.layout} options={["sidebar", "topnav"]} onChange={(v) => setTweak("layout", v)} />
        <TweakRadio label="Request form" value={tw.formStyle} options={["wizard", "single"]} onChange={(v) => setTweak("formStyle", v)} />
      </TweaksPanel>
    </ToastHost>
  );
}

window.DeskShell = DeskShell;
ReactDOM.createRoot(document.getElementById("root")).render(<App />);


</script>
